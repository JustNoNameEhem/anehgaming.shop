<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://doubtfulimpatient.com/0c/9f/f0/0c9ff038a2fc78b2b6ce37fc497df358.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iAdb Protocol | Aneh Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #7000ff;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 0%, #1a1a2e 0%, transparent 50%),
                linear-gradient(to bottom, #050505, #000000);
            color: #ffffff;
            overflow-x: hidden;
        }

        .cyber-card {
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .cyber-card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(45deg, var(--neon-cyan), transparent, var(--neon-purple));
            z-index: -1;
            border-radius: inherit;
            opacity: 0.3;
        }

        .video-glow {
            box-shadow: 0 0 40px -10px var(--neon-cyan);
        }

        .glitch-text {
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-purple);
        }

        video::-webkit-media-controls-panel {
            background-image: linear-gradient(transparent, rgba(0,0,0,0.9)) !important;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <header class="mb-8 text-center">
        <h1 class="text-2xl font-bold glitch-text mb-2">Tutorial iAdb</h1>
        <div class="flex items-center justify-center space-x-2 text-[10px] text-zinc-500 font-mono">
            <span class="status-dot"></span>
            <span>SYSTEM STATUS: ENCRYPTED</span>
            <span class="px-2">|</span>
            <span>BY ANEH GAMING</span>
        </div>
    </header>

    <main class="relative w-full max-w-[360px]">
        <div class="absolute -top-4 -left-4 w-8 h-8 border-t-2 border-l-2 border-cyan-400 opacity-50"></div>
        <div class="absolute -bottom-4 -right-4 w-8 h-8 border-b-2 border-r-2 border-purple-500 opacity-50"></div>

        <div class="cyber-card video-glow rounded-3xl overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-white/5">
                <i class="fas fa-shield-halved text-cyan-400 text-xs"></i>
                <span class="text-[10px] font-mono tracking-widest text-zinc-400">PLAYING_IADB_TUTORIAL.MP4</span>
                <i class="fas fa-ellipsis-v text-zinc-600 text-xs"></i>
            </div>

            <div class="relative bg-black">
                <video 
                    class="w-full block" 
                    controls 
                    playsinline
                    poster="https://via.placeholder.com/360x640/050505/00f2ff?text=Loading+Protocol...">
                    <source src="https://gitlab.com/channelaneh8/test/-/raw/main/lv_0_20260420024928.mp4?inline=false" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="p-4 flex justify-around items-center bg-zinc-900/40">
                <button class="text-zinc-500 hover:text-cyan-400 transition-colors"><i class="fas fa-redo-alt"></i></button>
                <div class="h-1 w-24 bg-zinc-800 rounded-full overflow-hidden">
                    <div class="h-full w-1/3 bg-cyan-500 shadow-[0_0_8px_#00f2ff]"></div>
                </div>
                <button class="text-zinc-500 hover:text-purple-400 transition-colors"><i class="fas fa-share-alt"></i></button>
            </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-4">
            <div class="p-3 border border-white/5 bg-white/5 rounded-xl">
                <p class="text-[10px] text-zinc-500 font-mono mb-1 uppercase">Method</p>
                <p class="text-xs font-bold">Wireless ADB</p>
            </div>
            <div class="p-3 border border-white/5 bg-white/5 rounded-xl">
                <p class="text-[10px] text-zinc-500 font-mono mb-1 uppercase">Target</p>
                <p class="text-xs font-bold">System Root</p>
            </div>
        </div>
    </main>

    <footer class="mt-12 opacity-30 hover:opacity-100 transition-opacity duration-500">
        <p class="font-mono text-[9px] tracking-[0.5em] text-center">
            &lt; ACCESS_GRANTED / 2026 &gt;
        </p>
    </footer>

</body>
</html>
